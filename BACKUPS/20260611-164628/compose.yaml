services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - proxy

  mariadb:
    image: lscr.io/linuxserver/mariadb:latest
    container_name: bookstack_db
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - MYSQL_ROOT_PASSWORD=90racano
      - MYSQL_DATABASE=bookstackapp
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=90racano
    volumes:
      - ./db:/config
    networks:
      - internal

  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - APP_URL=https://conocimiento.duckdns.org
      - APP_KEY=base64:XwDmFUGc1bERR2Z7IUh//SZR5x2Ue17KsJjoMuAZmsE=
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=bookstackapp
      - DB_USERNAME=bookstack
      - DB_PASSWORD=90racano
      - DB_USER=bookstack
      - DB_PASS=90racano
    volumes:
      - ./bookstack:/config
    networks:
      - proxy
      - internal

networks:
  proxy:
    name: proxy

  internal:
    name: bookstack_internal
    internal: true
